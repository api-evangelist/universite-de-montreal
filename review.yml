reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      UdeM has no centralized, branded developer portal. The verified public
      surface is research/library oriented: the Papyrus OAI-PMH endpoint was
      probed live and returns a valid OAI-PMH 2.0 Identify response, the SADVR
      REST API is documented on the UdeM Confluence wiki (doc page live, but its
      documented base path returns 404 and appears to be a testing/legacy
      endpoint), and UdeM participates in the Borealis Canadian Dataverse. The
      official UdeM Libraries GitHub org (bibudem) exists and hosts repository
      tooling. No endpoints, keys, or baseURLs were fabricated; the SADVR base
      URL is intentionally omitted from apis.yml because it does not resolve.
    endpoints:
      - url: https://umontreal.scholaris.ca/server/oai/openaire4?verb=Identify
        status: 200
        note: Live OAI-PMH 2.0 endpoint; valid Identify for Papyrus repository.
      - url: https://papyrus.bib.umontreal.ca/
        status: 200
        note: Papyrus institutional repository home (DSpace/Scholaris).
      - url: https://wiki.umontreal.ca/spaces/DOC/pages/294781211/API+REST+%E2%80%93+Description+technique
