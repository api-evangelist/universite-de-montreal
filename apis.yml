---
aid: universite-de-montreal
name: Université de Montréal
description: >-
  Université de Montréal (UdeM) is a leading French-language public research
  university in Montréal, Québec, Canada, ranked #95 in the QS World University
  Rankings 2025. Its public, machine-readable developer footprint is modest and
  research/library oriented rather than a centralized developer portal: the
  SADVR REST API (Service d'accès aux données de la Vitrine-Recherche) exposes
  research expertise and unit data, the Papyrus institutional repository offers
  a live OAI-PMH metadata endpoint, and UdeM participates in the Borealis
  Canadian Dataverse for research data. There is no single unified, branded
  developer portal; integration surfaces are distributed across library and
  research infrastructure.
